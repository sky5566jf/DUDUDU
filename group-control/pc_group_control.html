<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Matisu群控系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .dot-green { background: #52c41a; box-shadow: 0 0 6px #52c41a; }
  .dot-gray { background: #555; }
  .dot-red { background: #ff4d4f; }
  .dot-yellow { background: #faad14; }
  .dot-blue { background: #667eea; box-shadow: 0 0 6px #667eea; }

  /* === 布局 === */
  .layout { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* === 顶部工具栏 === */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3); flex-shrink: 0;
    flex-wrap: wrap;
  }
  .topbar .title { color: white; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .topbar .title span { color: #667eea; }

  /* 中继配置区 */
  .relay-config {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; background: rgba(255,255,255,0.08); border-radius: 8px;
    border: 1px solid rgba(102,126,234,0.3);
  }
  .relay-config label { color: #888; font-size: 11px; white-space: nowrap; }
  .relay-config input {
    background: #0d1117; color: #667eea; border: 1px solid #333; border-radius: 4px;
    padding: 3px 8px; font-size: 13px; font-family: monospace; width: 140px;
    outline: none; transition: border-color 0.2s;
  }
  .relay-config input:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
  .relay-config .conn-status { font-size: 11px; color: #888; min-width: 60px; text-align: center; }
  .relay-config .conn-status.connected { color: #52c41a; }
  .relay-config .conn-status.disconnected { color: #ff4d4f; }

  .topbar .spacer { flex: 1; }
  .topbar .info { font-size: 12px; color: #888; }

  /* === 按钮 === */
  .btn {
    padding: 6px 14px; border: none; border-radius: 6px;
    font-size: 12px; cursor: pointer; font-weight: 500;
    transition: all 0.2s; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #667eea; color: white; }
  .btn-primary:hover { background: #5568d3; }
  .btn-success { background: #52c41a; color: white; }
  .btn-success:hover { background: #46ad16; }
  .btn-danger { background: #ff4d4f; color: white; }
  .btn-danger:hover { background: #e03e3e; }
  .btn-warning { background: #faad14; color: white; }
  .btn-warning:hover { background: #d9920d; }
  .btn-default { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }
  .btn-default:hover { border-color: #667eea; color: #667eea; background: rgba(102,126,234,0.1); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-xs { padding: 2px 7px; font-size: 10px; }

  /* === 主内容区 === */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  .screens-header {
    background: white; border-bottom: 1px solid #e8e8e8;
    padding: 10px 20px; display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .screens-header h2 { font-size: 14px; font-weight: 600; color: #1a1a2e; }
  .screens-header .info { font-size: 12px; color: #888; flex: 1; }

  /* === 网格布局 === */
  .screens-grid {
    flex: 1; overflow-y: auto; padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(calc(280px * var(--grid-scale, 1)), 1fr));
    gap: calc(16px * var(--grid-scale, 1)); align-content: start;
  }

  /* === 设备卡片 === */
  .screen-card {
    background: white; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden; display: flex; flex-direction: column;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .screen-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  /* 弹出独立窗口状态 */
  .screen-card.popped-out .screen-view { display: none; }
  .screen-card.popped-out .popped-overlay { display: flex; }
  .popped-overlay {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 30px 20px; background: #f5f7ff; color: #667eea; gap: 10px;
    min-height: 120px; cursor: pointer; border-radius: 0 0 12px 12px;
  }
  .popped-overlay .ico { font-size: 32px; }
  .popped-overlay p { font-size: 13px; font-weight: 500; }
  .popped-overlay small { font-size: 11px; color: #999; }

  /* 卡片标题栏（含操作按钮） */
  .screen-title {
    padding: 8px 12px; display: flex; align-items: center; gap: 6px;
    background: #fafafa; border-bottom: 1px solid #f0f0f0;
    flex-wrap: wrap;
  }
  .screen-title .name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .screen-title .ip-label { font-size: 11px; color: #888; font-family: monospace; }
  .screen-title .latency { font-size: 11px; color: #888; font-family: monospace; }
  .screen-title .role-tag {
    font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .screen-title .alias-tag {
    font-size: 9px; padding: 1px 6px; border-radius: 3px; background: #e0e7ff; color: #4f46e5;
    font-weight: 600; white-space: nowrap;
  }
  .dark-mode .screen-title .alias-tag { background: #312e81; color: #a5b4fc; }
  .role-tag-master { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .role-tag-slave { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
  .card-actions {
    display: flex; gap: 4px; margin-left: auto;
  }
  .card-btn {
    padding: 2px 7px; border: 1px solid #d9d9d9; border-radius: 4px;
    background: white; font-size: 10px; cursor: pointer; white-space: nowrap;
    transition: all 0.15s; line-height: 1.5; color: #555;
  }
  .card-btn:hover { border-color: #667eea; color: #667eea; background: #f5f7ff; }
  .card-btn:active { transform: scale(0.93); }
  .card-btn.card-btn-primary { border-color: #667eea; color: #667eea; }
  .card-btn.card-btn-primary:hover { background: #667eea; color: white; }
  .card-btn.card-btn-danger { border-color: #ff4d4f; color: #ff4d4f; }
  .card-btn.card-btn-danger:hover { background: #ff4d4f; color: white; }
  .card-btn.card-btn-success { border-color: #52c41a; color: #52c41a; }
  .card-btn.card-btn-success:hover { background: #52c41a; color: white; }
  .card-btn.card-btn-active-success { background: #52c41a; color: white; border-color: #52c41a; }
  .card-btn.card-btn-active-danger { background: #ff4d4f; color: white; border-color: #ff4d4f; }

  /* 中继状态标签 */
  .relay-status-badge {
    font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; white-space: nowrap;
  }
  .relay-offline { background: #f5f5f5; color: #999; border: 1px solid #d9d9d9; }
  .relay-online { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .relay-error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffa39e; }

  /* 固定横屏比例容器 */
  .screen-view {
    position: relative; background: #111;
    overflow: hidden; cursor: default;
    aspect-ratio: 16 / 9;
    contain: content;
  }
  .screen-view img {
    width: 100%; height: 100%; display: block;
    object-fit: cover;
    touch-action: none; user-select: none;
    -webkit-user-select: none; pointer-events: none;
    will-change: transform;
  }
  .screen-view canvas {
    width: 100%; height: 100%; display: block;
    object-fit: cover; background: #000;
    touch-action: none; user-select: none;
    -webkit-user-select: none; pointer-events: none;
    will-change: transform;
  }
  .screen-view .offline-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 8px;
    color: #666; font-size: 13px;
  }
  .screen-view .offline-overlay .ico { font-size: 32px; opacity: 0.5; }
  .screen-view .blank-badge {
    position: absolute; left: 6px; bottom: 6px; z-index: 5;
    background: rgba(0,0,0,0.62); color: #ffd666; font-size: 10px;
    padding: 2px 7px; border-radius: 4px; pointer-events: none;
    display: none;
  }

  /* === 状态提示 === */
  .toast {
    position: fixed; top: 72px; right: 24px; z-index: 9999;
    background: #1a1a2e; color: white; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    transform: translateY(-8px); opacity: 0;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.toast-ok { background: #52c41a; }
  .toast.toast-err { background: #ff4d4f; }
  .toast.toast-warn { background: #faad14; color: #1a1a2e; }

  /* === 画质设置面板 === */
  .quality-panel {
    position: absolute; top: 100%; right: 0; z-index: 200;
    background: white; border: 1px solid #e8e8e8; border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 14px 18px;
    width: 340px; display: none;
  }
  .quality-panel.open { display: block; }
  .quality-panel h4 { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
  .quality-panel .q-section { margin-bottom: 14px; }
  .quality-panel .q-section-title {
    font-size: 11px; font-weight: 600; color: #667eea;
    margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #f0f0f0;
  }
  .quality-panel .q-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .quality-panel .q-label { font-size: 11px; color: #555; width: 32px; flex-shrink: 0; }
  .quality-panel .q-slider { flex: 1; height: 3px; accent-color: #667eea; cursor: pointer; }
  .quality-panel .q-val {
    font-size: 11px; color: #1a1a2e; font-family: monospace;
    width: 40px; text-align: right; flex-shrink: 0;
  }
  .quality-panel .q-ms-input {
    width: 65px; border: 1px solid #d9d9d9; border-radius: 4px;
    font-size: 11px; padding: 2px 5px; text-align: center;
  }
  .quality-panel .q-presets {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;
  }
  .quality-panel .q-preset-btn {
    padding: 4px 12px; border: 1px solid #d9d9d9; border-radius: 5px;
    background: white; font-size: 11px; cursor: pointer; transition: all 0.15s;
  }
  .quality-panel .q-preset-btn:hover { border-color: #667eea; color: #667eea; background: #f5f7ff; }
  .quality-panel .q-apply-btn {
    width: 100%; margin-top: 12px; padding: 8px; border: none;
    background: #667eea; color: white; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .quality-panel .q-apply-btn:hover { background: #5568d3; }
  .screens-header-right { position: relative; }

  /* === 缩放控件 === */
  .zoom-ctrl {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #555; white-space: nowrap;
  }
  .zoom-ctrl input[type=range] { width: 90px; cursor: pointer; }
  .zoom-ctrl span { font-size: 12px; min-width: 38px; text-align: right; }

  /* === 批量操作栏 === */
  .batch-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: #fffbe6; border-bottom: 1px solid #ffe58f;
    font-size: 12px; flex-wrap: wrap;
  }
  .batch-bar .batch-info { color: #ad8b00; font-weight: 500; }
  .batch-bar .spacer { flex: 1; }

  /* === 空状态 === */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #bbb; gap: 12px; grid-column: 1 / -1;
  }
  .empty-state .ico { font-size: 48px; }
  .empty-state p { font-size: 15px; }
  .empty-state small { font-size: 12px; color: #ccc; }

  /* === 日志面板（可折叠）=== */
  .log-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a2e; color: #aaa; font-size: 11px; font-family: monospace;
    max-height: 160px; overflow-y: auto;
    border-top: 2px solid #667eea;
    transition: max-height 0.3s, opacity 0.3s;
    z-index: 9000;
    display: none; opacity: 0;
  }
  .log-panel.open { display: block; opacity: 1; max-height: 200px; }
  .log-panel .log-line { padding: 2px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .log-line.log-err { color: #ff7875; }
  .log-line.log-ok { color: #73d13d; }
  .log-line.log-warn { color: #ffc069; }
  .log-line.log-touch { color: #69c0ff; }
  .log-toggle-btn {
    position: fixed; bottom: 0; right: 20px; z-index: 9001;
    padding: 4px 14px; border-radius: 8px 8px 0 0;
    background: #1a1a2e; color: #667eea; border: 2px solid #667eea; border-bottom: none;
    font-size: 11px; cursor: pointer; font-weight: 600;
  }
  .log-toggle-btn:hover { background: #667eea; color: white; }

  /* === 加载动画 === */
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }
  .loading-dot { animation: pulse 1.2s infinite; }

  /* === 响应式 === */
  @media (max-width: 800px) {
    .screens-grid {
      grid-template-columns: repeat(auto-fill, minmax(calc(220px * var(--grid-scale, 1)), 1fr)) !important;
    }
    .relay-config { display: none; } /* 小屏幕隐藏中继配置 */
    .topbar { padding: 8px 12px; }
  }

  /* === 子工具栏：状态 / 搜索 / 分组 / 全选 === */
  .subtoolbar {
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: #16162a; border-bottom: 1px solid #262646; flex-wrap: wrap;
  }
  .subtoolbar .top-info { color: #9aa; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .subtoolbar .dev-search {
    flex: 1; min-width: 160px; max-width: 280px; padding: 6px 10px; border-radius: 6px;
    border: 1px solid #2c2c4e; background: #0e0e1c; color: #eee; font-size: 12px; outline: none;
  }
  .subtoolbar .dev-search:focus { border-color: #667eea; }
  .subtoolbar .group-filter {
    padding: 6px 8px; border-radius: 6px; border: 1px solid #2c2c4e; background: #0e0e1c; color: #eee; font-size: 12px;
  }
  .subtoolbar .select-all { color: #bbb; font-size: 12px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; }

  /* === 批量操作栏 === */
  .selection-bar {
    display: none; align-items: center; gap: 8px; padding: 8px 14px;
    background: #1d1d3a; border-bottom: 1px solid #33336a; flex-wrap: wrap;
  }
  .selection-bar #selectionInfo { color: #ffd666; font-size: 12px; font-weight: 600; margin-right: 6px; }
  .selection-bar button {
    padding: 6px 12px; border-radius: 6px; border: 1px solid #667eea; background: #667eea; color: #fff;
    font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .selection-bar button:hover { background: #5566dd; }
  .selection-bar button.sel-cancel { background: transparent; border-color: #ff6b6b; color: #ff6b6b; }

  /* 卡片多选框：默认隐藏，hover 或选中时显示 */
  .screen-card { position: relative; }
  .screen-card .card-select {
    position: absolute; top: 6px; left: 6px; z-index: 8; width: 16px; height: 16px;
    cursor: pointer; opacity: 0; transition: opacity 0.15s; accent-color: #667eea;
  }
  .screen-card:hover .card-select, .screen-card .card-select:checked { opacity: 1; }
</style>
</head>
<body>

<div class="layout">

  <!-- 投屏区 -->
  <div class="main">
    <div class="screens-header">
      <h2>🖥️ Matisu群控系统</h2>
      <div class="zoom-ctrl" title="缩放设备卡片">
        <span>🔍</span>
        <input type="range" id="gridZoom" min="0.4" max="1.4" step="0.05" value="1"
          oninput="updateGridZoom(this.value)">
        <span id="gridZoomVal">100%</span>
      </div>
      <div class="screens-header-right">
        <button class="btn-groupcontrol" id="groupControlBtn" onclick="toggleGroupControl()">▶ 开启群控</button>
        <button class="btn btn-default btn-sm" onclick="toggleQualityPanel()" id="qualityPanelBtn">⚙️ 画质</button>
        <div class="quality-panel" id="qualityPanel">
          <h4>📷 截图画质参数</h4>

          <div class="q-section">
            <div class="q-section-title">主控画面（缩略图）</div>
            <div class="q-row">
              <span class="q-label">质量</span>
              <input type="range" class="q-slider" id="mq_quality" min="0.1" max="1.0" step="0.05" value="0.5"
                oninput="document.getElementById('mq_quality_val').textContent=parseFloat(this.value).toFixed(2)">
              <span class="q-val" id="mq_quality_val">0.50</span>
            </div>
            <div class="q-row">
              <span class="q-label">缩放</span>
              <input type="range" class="q-slider" id="mq_scale" min="0.1" max="1.0" step="0.05" value="0.3"
                oninput="document.getElementById('mq_scale_val').textContent=parseFloat(this.value).toFixed(2)">
              <span class="q-val" id="mq_scale_val">0.30</span>
            </div>
            <div class="q-row">
              <span class="q-label">间隔</span>
              <input type="number" class="q-ms-input" id="mq_interval" value="500" min="100" max="10000" step="100"> ms
            </div>
          </div>

          <div class="q-section">
            <div class="q-section-title">从控画面（缩略图）</div>
            <div class="q-row">
              <span class="q-label">质量</span>
              <input type="range" class="q-slider" id="sq_quality" min="0.1" max="1.0" step="0.05" value="0.3"
                oninput="document.getElementById('sq_quality_val').textContent=parseFloat(this.value).toFixed(2)">
              <span class="q-val" id="sq_quality_val">0.30</span>
            </div>
            <div class="q-row">
              <span class="q-label">缩放</span>
              <input type="range" class="q-slider" id="sq_scale" min="0.1" max="1.0" step="0.05" value="0.15"
                oninput="document.getElementById('sq_scale_val').textContent=parseFloat(this.value).toFixed(2)">
              <span class="q-val" id="sq_scale_val">0.15</span>
            </div>
            <div class="q-row">
              <span class="q-label">间隔</span>
              <input type="number" class="q-ms-input" id="sq_interval" value="2000" min="100" max="30000" step="500"> ms
            </div>
          </div>

          <div class="q-section">
            <div class="q-section-title">弹窗窗口（流畅模式）</div>
            <div class="q-row">
              <span class="q-label">质量</span>
              <input type="range" class="q-slider" id="pq_quality" min="0.1" max="1.0" step="0.05" value="0.85"
                oninput="document.getElementById('pq_quality_val').textContent=parseFloat(this.value).toFixed(2)">
              <span class="q-val" id="pq_quality_val">0.85</span>
            </div>
            <div class="q-row">
              <span class="q-label">缩放</span>
              <input type="range" class="q-slider" id="pq_scale" min="0.1" max="1.0" step="0.05" value="0.6"
                oninput="document.getElementById('pq_scale_val').textContent=parseFloat(this.value).toFixed(2)">
              <span class="q-val" id="pq_scale_val">0.60</span>
            </div>
            <div class="q-row">
              <span class="q-label">间隔</span>
              <input type="number" class="q-ms-input" id="pq_interval" value="80" min="30" max="2000" step="10"> ms
            </div>
          </div>

          <div class="q-presets">
            <button class="q-preset-btn" onclick="applyQualityPreset('lan')">📶 局域网（推荐）</button>
            <button class="q-preset-btn" onclick="applyQualityPreset('wifi')">📱 普通WiFi</button>
            <button class="q-preset-btn" onclick="applyQualityPreset('weak')">📉 弱网节流</button>
            <button class="q-preset-btn" onclick="applyQualityPreset('perf')">🚀 高质流畅</button>
          </div>
          <button class="q-apply-btn" onclick="applyQualitySettings()">✅ 应用并重启投屏</button>
        </div>
      </div>
    </div>

    <!-- 状态汇总 + 搜索 + 分组筛选 + 全选（百台管理必需） -->
    <div class="subtoolbar">
      <span class="top-info" id="topInfo">0 台</span>

<script>
// ==================== 数据层 ====================
var devices = [];           // [{id, name, ip, platform, deviceId, systemVersion, alias, role, online, relayConnected}]

// ── 主控角色用户偏好（跨刷新持久化）─────────────────────────────────────
// 主控是「服务器权威」：手机调 /api/group/relay/start?role=master 才进中继 masters，
// 刷新时 mergeRelayDevices 会从 /api/status 把角色写回，导致 UI 关掉的主控被还原。
// 这里把用户的角色选择存 localStorage，每次从服务器/清单合并角色后强制覆盖回来，
// 保证「刷新页面」后用户的选择依然生效；同时关/开主控时把角色推给手机同步服务器。
var ROLE_OVERRIDE_KEY = 'matisu_role_overrides_v1';
var roleOverrides = {};
try { roleOverrides = JSON.parse(localStorage.getItem(ROLE_OVERRIDE_KEY) || '{}') || {}; } catch (e) { roleOverrides = {}; }
function saveRoleOverrides() {
  try { localStorage.setItem(ROLE_OVERRIDE_KEY, JSON.stringify(roleOverrides)); } catch (e) {}
}
// 将用户持久化的角色偏好重新应用到所有设备（在服务器/清单角色合并之后调用）
function applyRoleOverrides() {
  devices.forEach(function(d) {
    if (d.ip && roleOverrides[d.ip] && d.role !== roleOverrides[d.ip]) {
      d.role = roleOverrides[d.ip];
    }
  });
}
// 把设备当前角色推给手机（经 /api/group/relay/start?role=），让中继 masters/slaves 与 UI 一致。
// 中继不可达 / 未连时不推（避免无谓报错），此时仅靠 localStorage 保证显示正确。
function pushDeviceRole(dev) {
  if (!relayIp || !dev.relayConnected) return;
  var roleParam = dev.role === 'master' ? 'master' : 'slave';
  fetch('http://' + dev.ip + ':8182/api/group/relay/start?relayIp=' + encodeURIComponent(relayIp) + '&role=' + roleParam, {
    method: 'POST', signal: AbortSignal.timeout(8000), headers: {'Content-Type': 'application/json'}
  })
    .then(function(r) { return r.json(); })
    .then(function() { log('已向服务器同步 ' + dev.name + ' 角色=' + roleParam, 'ok'); })
    .catch(function(e) { log('角色同步失败 ' + dev.name + ': ' + e.message, 'warn'); });
}
var activeTimers = {};       // 截图定时器
var relayWs = null;          // 浏览器到中继服务器的 WS 连接
var relayIp = '';            // 中继服务器 IP
var groupControlOn = false;  // 全局群控开关：默认关闭，所有设备不自动连中继
var wsStatus = 'disconnected'; // disconnected | connecting | connected
var layoutMode = 'grid';
var frameCounters = {};
var lastFpsTick = {};
var touchActive = false;
var popWindows = {};         // 弹出窗口引用
var popCheckIntervals = {};  // 监听弹出窗口关闭
var qkurlRefreshTimer = null;
var lastQkurlSig = '';   // 设备集合签名，用于跳过无变化的整页重建（避免 30s 轮询闪屏）
// 搜索/分组/多选状态（百台管理）
var devSearch = '';
var devGroup = '';
var selectedSet = {};     // dev.id -> true（多选）
var adaptiveQualityOn = true; // 设备数 > 阈值时自动压低从控画质
var selfHealTimer = null;

// ==================== 日志系统（必须在 init 之前定义）====================
var logTypes = { info: '🔵', ok: '✅', err: '❌', warn: '⚠️', touch: '👆' };
var logThrottle = 0;
function log(msg, type) {
  type = type || 'info';
  if (type === 'touch') {
    var now = Date.now();
    if (now - logThrottle < 500) return;
    logThrottle = now;
  }
  var t = new Date().toLocaleTimeString('zh-CN', {hour12: false});
  var prefix = logTypes[type] || '';
  console.log('[' + t + '] ' + prefix + ' ' + msg);

  var panel = document.getElementById('logPanel');
  if (panel) {
    var div = document.createElement('div');
    div.className = 'log-line' + (type === 'err' ? ' log-err' : '') + (type === 'ok' ? ' log-ok' : '') + (type === 'warn' ? ' log-warn' : '') + (type === 'touch' ? ' log-touch' : '');
    div.textContent = '[' + t + '] ' + msg;
    panel.appendChild(div);
    panel.scrollTop = panel.scrollHeight;
    while (panel.children.length > 200) panel.removeChild(panel.firstChild);
  }
  updateLogToggleCount();
}

function toggleLogPanel() {
  var p = document.getElementById('logPanel');
  if (!p) return;
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function clearLog() {
  var p = document.getElementById('logPanel');
  if (p) { p.innerHTML = ''; }
  updateLogToggleCount();
}

function updateLogToggleCount() {
  var btn = document.getElementById('logToggleBtn');
  if (!btn) return;
  var p = document.getElementById('logPanel');
  if (!p) return;
  btn.textContent = (p.children.length > 0 ? '📋 (' + p.children.length + ')' : '📋');
}

// ==================== 截图画质全局参数 ====================
var screenParams = {
  master:  { quality: 0.5,  scale: 0.3,  interval: 500  },
  slave:   { quality: 0.3,  scale: 0.15, interval: 2000 },
  popout:  { quality: 0.85, scale: 0.6,  interval: 80   }
};

// 画质预设
var qualityPresets = {
  lan:  { master: {quality:0.7, scale:0.5, interval:300},  slave: {quality:0.5, scale:0.3, interval:1000}, popout: {quality:0.92, scale:0.75, interval:50}  },
  wifi: { master: {quality:0.5, scale:0.3, interval:500},  slave: {quality:0.3, scale:0.15,interval:2000}, popout: {quality:0.85, scale:0.6, interval:80}   },
  weak: { master: {quality:0.3, scale:0.2, interval:1500}, slave: {quality:0.2, scale:0.1, interval:5000}, popout: {quality:0.6,  scale:0.4, interval:150}  },
  perf: { master: {quality:0.8, scale:0.6, interval:200},  slave: {quality:0.6, scale:0.4, interval:800},  popout: {quality:0.95, scale:0.85,interval:45}   }
};

// ==================== 初始化：强制中继模式，IP=网页所在电脑局域网IP ====================
(function init() {
  // 先问中继本机的局域网IP(页面从localhost打开时也不会错用手机无法连的localhost)
  detectRelayIp(function(ip) {
    relayIp = ip || (window.location.hostname || 'localhost');
    log('使用中继服务器 IP: ' + relayIp, 'ok');

    // 恢复缩放设置
    var savedZoom = localStorage.getItem('tvnc_grid_zoom');
    if (savedZoom) {
      document.getElementById('gridZoom').value = savedZoom;
      updateGridZoom(savedZoom);
    }

    // 设备一次性加载，会话期间不会增减 → 只加载一次，不做 30s 轮询（避免无谓重拉 qkurl.txt 与周期闪屏）
    loadDevicesFromQkurl();

    // 方案A：默认不连中继 WS（群控关）。截图改为直连手机 :8182，由 parseQkurl 末尾启动。
    setGroupControlBtn();
    // 初始化离主线程解码 Worker（根治 100+ 设备 JPEG 解码卡顿）
    decodeWorker = createDecodeWorker();
    if (decodeWorker) log('已启用 Web Worker 离主线程解码', 'ok');
    else log('当前浏览器不支持 Worker 解码，降级主线程', 'warn');
    // 中继断线自愈（群控开启时每 10s 看护掉线设备）
    startRelaySelfHeal();
  });

  log('TrollVNC 电脑群控管理台 v3.7 (中继模式) 就绪', 'ok');
})();

// 探测中继所在电脑的真实局域网IP
function detectRelayIp(cb) {
  var host = window.location.hostname || 'localhost';
  var url = 'http://' + host + ':9527/api/relay/info';
  fetch(url, { signal: AbortSignal.timeout(5000) })
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j && j.ip) { cb(j.ip); return; }
      cb(window.location.hostname || 'localhost');
    })
    .catch(function(e) {
      console.warn('detectRelayIp failed', e);
      cb(window.location.hostname || 'localhost');
    });
}

// ==================== qkurl.txt 设备列表加载 ====================
function loadDevicesFromQkurl() {
  fetch('qkurl.txt?t=' + Date.now(), {signal: AbortSignal.timeout(10000)})
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(function(buf) {
      var text = new TextDecoder('utf-8').decode(buf);
      parseQkurl(text);
    })
    .catch(function(e) {
      log('qkurl.txt 加载失败: ' + e.message, 'err');
    });
}

function refreshDevices() {
  log('手动刷新设备列表...', 'info');
  loadDevicesFromQkurl();
  toast('正在刷新设备列表...', 'warn');
}

function parseQkurl(text) {
  var lines = text.split('\n');
  var newDevices = [];
  var idCounter = 1;

  lines.forEach(function(line) {
    line = line.trim();
    if (!line || line.startsWith('#')) return;
    var parts = line.split('----');
    if (parts.length < 1 || !parts[0]) return;

    var ip = parts[0].trim();
    var name = (parts[1] || '').trim() || ('设备 ' + idCounter);
    var platform = (parts[2] || '').trim() || 'iOS';
    var deviceId = (parts[3] || '').trim() || '';
    var systemVersion = (parts[4] || '').trim() || '';
    var alias = (parts[5] || '').trim() || '';
    var group = (parts[6] || '').trim() || '';

    var existing = devices.find(function(d) { return d.ip === ip; });
    if (existing) {
      existing.name = name;
      existing.platform = platform;
      existing.deviceId = deviceId;
      existing.systemVersion = systemVersion;
      existing.alias = alias;
      existing.group = group;
      newDevices.push(existing);
    } else {
      newDevices.push({
        id: 'dev_' + Date.now() + '_' + idCounter,
        name: name,
        ip: ip,
        platform: platform,
        deviceId: deviceId,
        systemVersion: systemVersion,
        alias: alias,
        group: group,
        role: newDevices.length === 0 ? 'master' : 'slave',
        online: null,
        relayConnected: false
      });
    }
    idCounter++;
  });

  // 保留已有主控角色
  var oldMaster = devices.find(function(d) { return d.role === 'master'; });
  if (oldMaster) {
    var newMasterMatch = newDevices.find(function(d) { return d.ip === oldMaster.ip; });
    if (newMasterMatch) {
      newDevices.forEach(function(d) { d.role = d.id === newMasterMatch.id ? 'master' : 'slave'; });
    }
  }

  devices = newDevices;
  applyRoleOverrides(); // 应用用户持久化的主控偏好（覆盖首台默认 master / 服务器角色）
  applyAdaptiveQuality(); // 设备数 > 阈值时自动压低从控画质，保护百台规模性能
  // 列表无变化时跳过整页 DOM 重建：30s 轮询本就用于「发现新增/改名设备」，
  // 若设备集合/名称/角色都没变则不必重建，避免百台规模下每 30s 全网格闪动。
  var qsig = newDevices.map(function(d){ return d.ip + '|' + d.name + '|' + d.role + '|' + (d.group || ''); }).join(';');
  if (qsig === lastQkurlSig) { updateTopInfo(); return; }
  lastQkurlSig = qsig;
  log('从 qkurl.txt 加载 ' + devices.length + ' 台设备', 'ok');
  renderScreens();
  updateTopInfo();
  // 拉取真实设备名（中继可达时覆盖占位名）
  refreshAllDeviceNames();
  // 启动截图（方案A：群控关时直连手机 :8182；群控开时自动切到中继代理，见 getScreenshotBaseUrl 每帧判定）
  startScreensOnly();
}

// ==================== 中继自动发现设备（上百台规模免维护 qkurl.txt）====================
var relayDiscoverTimer = null;

// 归一化 IP：剥掉 IPv6 映射前缀 "::ffff:"（中继监听 :: 时可能返回该形式）
function normalizeIp(ip) {
  if (!ip) return ip;
  var s = String(ip).trim();
  if (s.indexOf('::ffff:') === 0) s = s.slice(7);
  if (s.charAt(0) === '[' && s.charAt(s.length - 1) === ']') s = s.slice(1, -1);
  return s;
}

function discoverDevicesFromRelay() {
  if (!relayIp) return;
  fetch('http://' + relayIp + ':9527/api/status', { signal: AbortSignal.timeout(5000) })
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(st) {
      var list = [];
      (st.masters || []).forEach(function(m) { list.push({ deviceId: m.deviceId, ip: normalizeIp(m.ip), role: 'master' }); });
      (st.slaves || []).forEach(function(s) { list.push({ deviceId: s.deviceId, ip: normalizeIp(s.ip), role: 'slave' }); });
      mergeRelayDevices(list);
    })
    .catch(function(e) { log('中继设备发现失败: ' + e.message, 'err'); });
}

function mergeRelayDevices(list) {
  if (!list.length) return;
  list.forEach(function(rd) {
    if (!rd.deviceId) return;
    var ip = normalizeIp(rd.ip);
    if (!ip) return;
    // 只更新 qkurl.txt 清单里已存在的设备，不自动加入清单外的设备
    var existing = devices.find(function(d) { return normalizeIp(d.ip) === ip; });
    if (!existing) return; // 不在清单中 → 忽略
    existing.deviceId = rd.deviceId;
    existing.ip = ip;
    existing.role = rd.role;
    existing.relayConnected = true;
    existing.online = true;
    if (!existing.name || existing.name === '未知设备') {
      existing.name = rd.deviceId.slice(0, 8);
    }
  });
  applyRoleOverrides(); // 服务器角色合并后，强制套用用户持久化偏好（防止刷新后主控被还原）
  renderScreens();
  updateTopInfo();
  refreshAllDeviceNames();
}

// ==================== Toast 提示 ====================
var toastTimer;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'ok' ? ' toast-ok' : type === 'err' ? ' toast-err' : type === 'warn' ? ' toast-warn' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = 'toast'; }, 2800);
}

// ==================== 缩放控制 ====================
function updateGridZoom(val) {
  var scale = parseFloat(val);
  document.getElementById('screensGrid').style.setProperty('--grid-scale', scale);
  document.getElementById('gridZoomVal').textContent = Math.round(scale * 100) + '%';
  localStorage.setItem('tvnc_grid_zoom', val);
}

// ==================== 工具函数 ====================
function getMasterDevice() {
  return devices.find(function(d) { return d.role === 'master'; });
}
function getSlaveDevices() {
  return devices.filter(function(d) { return d.role === 'slave'; });
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateTopInfo() {
  var info = document.getElementById('topInfo');
  if (!info) return;
  var masterDev = getMasterDevice();
  var onlineCount = devices.filter(function(d) { return d.online; }).length;
  var relayConnCount = devices.filter(function(d) { return d.relayConnected; }).length;
  info.textContent = devices.length + '台 · 在线:' + onlineCount + ' · 中继:' + relayConnCount + ' · 主控:' + (masterDev ? masterDev.name : '-');
}

// ==================== 搜索 / 分组筛选（仅切换卡片显隐，不重建 canvas）====================
function applyFilters() {
  var kw = (devSearch || '').trim().toLowerCase();
  var gf = devGroup || '';
  devices.forEach(function(d) {
    var card = document.getElementById('card_' + d.id);
    if (!card) return;
    var n = (d.name || d.alias || '').toLowerCase();
    var ip = (d.ip || '').toLowerCase();
    var matchKw = !kw || n.indexOf(kw) >= 0 || ip.indexOf(kw) >= 0;
    var matchGrp = !gf || (d.group || '') === gf;
    card.style.display = (matchKw && matchGrp) ? '' : 'none';
    if (!(matchKw && matchGrp)) d._visible = false; // 隐藏即视为不可见，暂停解码
  });
}
function onSearchInput(v) { devSearch = v; applyFilters(); }
function onGroupFilter(v) { devGroup = v; applyFilters(); }
function refreshGroupOptions() {
  var sel = document.getElementById('groupFilter');
  if (!sel) return;
  var groups = {};
  devices.forEach(function(d){ if (d.group) groups[d.group] = true; });
  var cur = sel.value;
  var html = '<option value="">全部分组</option>';
  Object.keys(groups).sort().forEach(function(g){ html += '<option value="' + escHtml(g) + '">' + escHtml(g) + '</option>'; });
  sel.innerHTML = html;
  if (cur && groups[cur]) sel.value = cur;
}

// ==================== 多选 + 批量操作 ====================
function toggleSelectAll(checked) {
  devices.forEach(function(d) {
    var card = document.getElementById('card_' + d.id);
    if (card && card.style.display !== 'none') {
      selectedSet[d.id] = checked;
      var cb = document.getElementById('sel_' + d.id);
      if (cb) cb.checked = checked;
    }
  });
  updateSelectionBar();
}
function onCardSelect(id, checked) {
  if (checked) selectedSet[id] = true; else delete selectedSet[id];
  updateSelectionBar();
}
function updateSelectionBar() {
  var bar = document.getElementById('selectionBar');
  var info = document.getElementById('selectionInfo');
  if (!bar || !info) return;
  var n = Object.keys(selectedSet).length;
  info.textContent = '已选 ' + n + ' 台';
  bar.style.display = n > 0 ? 'flex' : 'none';
}
function clearSelection() {
  selectedSet = {};
  devices.forEach(function(d){ var cb = document.getElementById('sel_' + d.id); if (cb) cb.checked = false; });
  var sa = document.getElementById('selectAllCb'); if (sa) sa.checked = false;
  updateSelectionBar();
}
function getSelectedDevices() { return devices.filter(function(d){ return selectedSet[d.id]; }); }

// 逐台 HTTP 动作（经手机 :8182 REST，CORS*；中继不可达时仍可用）
function deviceRestAction(dev, path, opts) {
  opts = opts || {};
  var init = { method: opts.method || 'POST', signal: AbortSignal.timeout(opts.timeout || 6000) };
  if (opts.body) { init.headers = { 'Content-Type': 'application/json' }; init.body = JSON.stringify(opts.body); }
  return fetch('http://' + dev.ip + ':8182' + path, init)
    .then(function(r){ return { ok: r.ok, status: r.status }; })
    .catch(function(e){ return { ok: false, error: String((e && e.message) || e) }; });
}

function batchHome() {
  var sel = getSelectedDevices();
  if (!sel.length) { toast('请先勾选设备', 'warn'); return; }
  if (relayWs && relayWs.readyState === 1) {
    sel.forEach(function(d){ relayWs.send(JSON.stringify({ type:'key', action:'home_down', targetIp: d.ip })); });
    setTimeout(function(){ sel.forEach(function(d){ if (relayWs && relayWs.readyState === 1) relayWs.send(JSON.stringify({ type:'key', action:'home_up', targetIp: d.ip })); }); }, 60);
    log('广播 Home → ' + sel.length + ' 台 (WS)', 'ok');
  } else {
    sel.forEach(function(d){ deviceRestAction(d, '/api/key?code=home'); });
    log('广播 Home → ' + sel.length + ' 台 (HTTP)', 'ok');
  }
  toast('已广播 Home 到 ' + sel.length + ' 台', 'ok');
}
function batchLock() {
  var sel = getSelectedDevices(); if (!sel.length) { toast('请先勾选设备', 'warn'); return; }
  toast('正在锁屏 ' + sel.length + ' 台...', 'warn');
  var done = 0, ok = 0;
  sel.forEach(function(d){ deviceRestAction(d, '/api/screen/lock').then(function(r){ done++; if (r.ok) ok++; if (done === sel.length) toast('锁屏完成: ' + ok + '/' + sel.length, 'ok'); }); });
}
function batchReboot() {
  var sel = getSelectedDevices(); if (!sel.length) { toast('请先勾选设备', 'warn'); return; }
  toast('正在重启 ' + sel.length + ' 台...', 'warn');
  var done = 0, ok = 0;
  sel.forEach(function(d){ deviceRestAction(d, '/api/reboot').then(function(r){ done++; if (r.ok) ok++; if (done === sel.length) toast('重启指令已发: ' + ok + '/' + sel.length, 'ok'); }); });
}
function batchInstall() {
  var sel = getSelectedDevices(); if (!sel.length) { toast('请先勾选设备', 'warn'); return; }
  var url = prompt('输入 IPA 下载地址(URL)：'); if (!url) return;
  toast('正在安装到 ' + sel.length + ' 台...', 'warn');
  var done = 0, ok = 0;
  sel.forEach(function(d){ deviceRestAction(d, '/api/install', { body: { url: url } }).then(function(r){ done++; if (r.ok) ok++; if (done === sel.length) toast('安装完成: ' + ok + '/' + sel.length, 'ok'); }); });
}
function batchScreenshotAll() {

  sel.forEach(function(d){ if (activeTimers[d.id]) clearTimeout(activeTimers[d.id]); fetchFrame(d); });

// ==================== 全局自适应画质（百台规模保护）====================
function applyAdaptiveQuality() {
  if (!adaptiveQualityOn) return;
  var n = devices.filter(function(d){ return d.role !== 'none'; }).length;
  if (n <= 20) return; // 小规模保持默认高清
  var f = n > 80 ? 0.5 : (n > 40 ? 0.7 : 0.85);
  screenParams.slave.quality = Math.round(0.3 * f * 100) / 100;
  screenParams.slave.scale = n > 80 ? 0.1 : (n > 40 ? 0.12 : 0.15);
  screenParams.slave.interval = n > 80 ? 4000 : (n > 40 ? 3000 : 2000);
  screenParams.master.quality = Math.round(0.5 * f * 100) / 100;
  screenParams.master.scale = n > 80 ? 0.25 : 0.3;
  screenParams.master.interval = n > 80 ? 1500 : (n > 40 ? 1000 : 800);
  log('自适应画质: ' + n + ' 台 → 从控 q=' + screenParams.slave.quality + ' s=' + screenParams.slave.scale + ' i=' + screenParams.slave.interval + 'ms', 'info');
}

// ==================== 中继断线自愈（仅群控开启时看护）====================
function startRelaySelfHeal() {
  if (selfHealTimer) return;
  selfHealTimer = setInterval(function() {
    if (!groupControlOn || !relayIp) return;
    fetch('http://' + relayIp + ':9527/api/status', { signal: AbortSignal.timeout(4000) })
      .then(function(r){ return r.json(); })
      .then(function(st) {
        var live = {};
        (st.masters || []).concat(st.slaves || []).forEach(function(x){ live[normalizeIp(x.ip)] = true; });
        devices.forEach(function(d) {
          if (d.relayConnected && !live[normalizeIp(d.ip)]) {
            fetch('http://' + d.ip + ':8182/api/group/relay/start?relayIp=' + encodeURIComponent(relayIp) + '&role=' + (d.role === 'master' ? 'master' : 'slave'), { method:'POST', signal: AbortSignal.timeout(6000) })
              .then(function(){ log('自愈: 重连 ' + d.ip + ' 到中继', 'ok'); })
              .catch(function(){});
          }
        });
      }).catch(function(){});
  }, 10000);
}

// ==================== 真实设备名解析（经中继 HTTP 代理）====================
// 设备扫码只带 IP/别名，真实设备名由手机端 REST /api/device 提供。
// 浏览器通过中继 9527 的 /api/device?ip= 代理拉取，失败则保留原名（不阻断流程）。
function fetchDeviceRealName(dev) {
  if (!dev || !dev.ip || !relayIp) return;
  var url = 'http://' + relayIp + ':9527/api/device?ip=' + encodeURIComponent(dev.ip);
  fetch(url).then(function(r) { return r.json(); }).then(function(info) {
    if (!info) return;
    var name = info.name || info.deviceName || info.devicename || info.device_name;
    if (name && name !== dev.name) {
      dev.name = name;
      if (info.systemVersion) dev.systemVersion = info.systemVersion;
      else if (info.version) dev.systemVersion = info.version;
      if (info.model) dev.model = info.model;
      updateCardName(dev);
      updateTopInfo();
      log('✓ 获取真实设备名: ' + dev.ip + ' → ' + dev.name, 'ok');
    } else if (name) {
      // 名字未变，仅同步其他字段，避免无谓重建 DOM 造成画面闪烁
      if (info.systemVersion) dev.systemVersion = info.systemVersion;
      else if (info.version) dev.systemVersion = info.version;
      if (info.model) dev.model = info.model;
    }
  }).catch(function() { /* 中继/设备不可达，保留原名 */ });
}

function refreshAllDeviceNames() {
  if (!devices || !devices.length) return;
  devices.forEach(function(d) { if (d.ip) fetchDeviceRealName(d); });
}

// ==================== 中继 WebSocket 管理（浏览器 → 中继服务器）====================
function connectRelayWS() {
  // relayIp 由 init()/detectRelayIp() 设定，不再覆盖
  if (!relayIp) {
    relayIp = window.location.hostname || 'localhost';
  }

  if (relayWs) { try { relayWs.close(); } catch(e) {} relayWs = null; }
  wsStatus = 'connecting';
  updateWsStatusUI();

  var url = 'ws://' + relayIp + ':8183?role=browser';
  log('连接中继 WS: ' + url, 'info');

  try {
    relayWs = new WebSocket(url);
  } catch(e) {
    log('WebSocket 创建失败: ' + e.message, 'err');
    wsStatus = 'disconnected'; updateWsStatusUI();
    return;
  }

  relayWs.onopen = function() {
    wsStatus = 'connected';
    log('已连接到中继服务器 ' + relayIp + ':8183', 'ok');
    updateWsStatusUI();
    toast('已连接中继服务器 (' + relayIp + ')', 'ok');

    // 启动截图（走中继代理）
    startScreensOnly();
    // 从中继自动发现设备（上百台规模免维护 qkurl.txt）
    discoverDevicesFromRelay();
    if (relayDiscoverTimer) clearInterval(relayDiscoverTimer);
    relayDiscoverTimer = setInterval(discoverDevicesFromRelay, 10000);
    // 拉取各设备真实名称（替换扫码时的占位名）
    refreshAllDeviceNames();
  };

  relayWs.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'welcome') {
        log('中继欢迎消息: role=' + data.role, 'ok');
      } else if (data.type === 'frame' && data.data) {
        // WS 推帧模式（中继 RELAY_WS_FRAMES=1）：base64 JPEG 直绘，停止 HTTP 轮询
        var fdev = devices.find(function(d){ return normalizeIp(d.ip) === normalizeIp(data.ip); });
        if (fdev) drawFrameFromB64(fdev, data.data);
      } else if (data.type === 'rfb_frame' && data.data) {
        // RFB 增量帧桥（中继 RELAY_RFB=1）：局部刷新 RGBA 矩形
        var rdev = devices.find(function(d){ return normalizeIp(d.ip) === normalizeIp(data.ip); });
        if (rdev) drawRfbFrame(rdev, data.x, data.y, data.w, data.h, data.data, data.fbw, data.fbh);
      } else if (data.type === 'rfb_stop') {
        // 中继 RFB 会话结束（手机 VNC 不可达/断开）→ 该设备回退 HTTP 轮询（自愈）
        var sdev = devices.find(function(d){ return normalizeIp(d.ip) === normalizeIp(data.ip); });
        if (sdev) sdev._rfbActive = false;
      }
      // 收到从控加入通知等可以在这里处理
    } catch(ex) {}
  };

  relayWs.onerror = function() {
    log('中继 WS 错误（检查中继服务器是否运行）', 'err');
    wsStatus = 'disconnected'; wsFramePushActive = false;
    devices.forEach(function(d){ d._rfbActive = false; }); // RFB 通道失效，回退 HTTP 轮询
    updateWsStatusUI();
  };

  relayWs.onclose = function() {
    wsStatus = 'disconnected';
    wsFramePushActive = false; // 推帧通道失效，fetchFrame 将在 2s 内心跳内恢复 HTTP 轮询
    devices.forEach(function(d){ d._rfbActive = false; }); // RFB 通道失效，回退 HTTP 轮询
    log('中继 WS 已断开（推帧模式退出，回退 HTTP 轮询）', 'warn');
    updateWsStatusUI();
  };
}

function disconnectRelayWS() {
  if (relayWs) { try { relayWs.close(); } catch(e) {} relayWs = null; }
  wsStatus = 'disconnected';
  updateWsStatusUI();
  toast('已断开中继连接', 'warn');
}

function updateWsStatusUI() {
  var el = document.getElementById('wsConnStatus');
  if (!el) return;
  el.textContent = wsStatus === 'connected' ? '已连接' : wsStatus === 'connecting' ? '连接中...' : '未连接';
  el.className = 'conn-status ' + (wsStatus === 'connected' ? 'connected' : wsStatus === 'connecting' ? '' : 'disconnected');
}

// ==================== 离主线程解码（Web Worker + ImageBitmap）====================
// 100+ 设备时最大卡顿来源是浏览器在主线程解码 JPEG。把 fetch+decode 移入 Worker，
// 回传 ImageBitmap，主线程只做廉价 drawImage，解码不再阻塞 UI。
var decodeWorker = null;
var cardCtx = {};            // dev.id -> canvas 2d context 缓存
var frameDecodeBusy = {};    // dev.id -> 是否正在解码（单飞，防堆积）
var cardObserver = null;     // IntersectionObserver 单例

function createDecodeWorker() {
  if (typeof Worker === 'undefined' || typeof createImageBitmap === 'undefined'
      || typeof URL === 'undefined' || !URL.createObjectURL) return null;
  var code = [
    'self.onmessage=function(e){',
    ' var m=e.data; if(!m||m.type!=="decode")return;',
    ' var id=m.id,url=m.url;',
    ' fetch(url).then(function(r){if(!r.ok)throw new Error("http "+r.status);return r.blob();})',
    '  .then(function(b){',
    '    if(!b||b.size<500){self.postMessage({type:"blank",id:id});return;}',
    '    return createImageBitmap(b);',
    '  })',
    '  .then(function(bmp){if(!bmp)return;self.postMessage({type:"bitmap",id:id,bmp:bmp,w:bmp.width,h:bmp.height},[bmp]);})',
    '  .catch(function(err){self.postMessage({type:"error",id:id,message:String((err&&err.message)||err)});});',
    '};'
  ].join('\n');
  try {
    var blob = new Blob([code], { type: 'application/javascript' });
    var w = new Worker(URL.createObjectURL(blob));
    w.onmessage = onDecodeMessage;
    w.onerror = function() { decodeWorker = null; };
    return w;
  } catch (e) { return null; }
}

function onDecodeMessage(e) {
  var m = e.data;
  if (!m || !m.id) return;
  var dev = devices.find(function(d) { return d.id === m.id; });
  if (!dev) return;
  if (dev._wd) { clearTimeout(dev._wd); dev._wd = null; }
  if (m.type === 'bitmap') {
    dev._blank = false; updateBlankBadge(dev, false);
    drawBitmapToCard(dev, m.bmp, m.w, m.h);
    dev.online = true; dev._hasScreen = true; dev._screenErrLogged = false;
    updateDeviceOnlineStatus(dev);
    if (!dev._screenOkLogged) { log('✓ ' + dev.name + ' 截图正常 (Worker解码)', 'ok'); dev._screenOkLogged = true; }
    frameDecodeBusy[dev.id] = false;
    scheduleNextFrame(dev);
  } else if (m.type === 'blank') {
    frameDecodeBusy[dev.id] = false;
    handleBlankFrame(dev);
  } else if (m.type === 'error') {
    frameDecodeBusy[dev.id] = false;
    handleFrameError(dev);
  }
}

// 空白/无信号帧检测：手机熄屏 / App 后台 / 中继偶发空帧 会返回纯色或极暗 JPEG，
// 画上去就是"突然黑屏一下"。8x8 采样判定：(1) 单一纯色(最大最小差<12)=无信号屏；
// (2) 平均极暗(<40/通道≈13)=暗屏闪烁。命中且已有正常画面 → 丢弃保留上一帧，杜绝闪黑。
var _blackCheckCv = null;
function isBlankOrDarkFrame(bmp) {
  try {
    if (!_blackCheckCv) _blackCheckCv = document.createElement('canvas');
    _blackCheckCv.width = 8; _blackCheckCv.height = 8;
    var c = _blackCheckCv.getContext('2d', { willReadFrequently: true });
    c.clearRect(0, 0, 8, 8);
    c.drawImage(bmp, 0, 0, 8, 8);
    var d = c.getImageData(0, 0, 8, 8).data;
    var sum = 0, minL = 765, maxL = 0;
    for (var i = 0; i < d.length; i += 4) {
      var L = d[i] + d[i + 1] + d[i + 2];
      sum += L;
      if (L < minL) minL = L;
      if (L > maxL) maxL = L;
    }
    var isUniform = (maxL - minL) < 12;   // 全屏单一纯色 → 熄屏/无信号
    var isDark = (sum / 64) < 40;         // 平均极暗 → 暗屏闪烁
    return isUniform || isDark;
  } catch (e) { return false; }
}

// 同款 8x8 采样空白检测，但入参是 canvas（用于 RFB 离屏整帧缓冲）：
// RFB 增量帧桥下，离屏缓冲初始为黑、熄屏/后台时 VNC 帧缓冲也是黑，
// 命中即说明「当前无有效画面」，不应把黑画到卡片，应保留上一帧并由 HTTP 接管。
function isBlankOrDarkCanvas(cv) {
  try {
    if (!_blackCheckCv) _blackCheckCv = document.createElement('canvas');
    _blackCheckCv.width = 8; _blackCheckCv.height = 8;
    var c = _blackCheckCv.getContext('2d', { willReadFrequently: true });
    c.clearRect(0, 0, 8, 8);
    c.drawImage(cv, 0, 0, 8, 8);
    var d = c.getImageData(0, 0, 8, 8).data;
    var sum = 0, minL = 765, maxL = 0;
    for (var i = 0; i < d.length; i += 4) {
      var L = d[i] + d[i + 1] + d[i + 2];
      sum += L;
      if (L < minL) minL = L;
      if (L > maxL) maxL = L;
    }
    var isUniform = (maxL - minL) < 12;
    var isDark = (sum / 64) < 40;
    return isUniform || isDark;
  } catch (e) { return false; }
}

function drawBitmapToCard(dev, bmp, w, h) {
  var cv = document.getElementById('cv_' + dev.id);
  if (!cv) return;
  // RFB 增量帧已接管该卡 → HTTP 轮询绘制让位，避免两通道互相 resize 清空画布导致闪黑
  if (dev._rfbActive) return;
  // 已有正常画面且本次为空白/暗帧 → 跳过绘制，保持上一帧，并标记"屏幕未激活"
  if (dev._hasScreen && isBlankOrDarkFrame(bmp)) {
    dev.online = true;
    dev._blank = true; updateBlankBadge(dev, true);
    updateDeviceOnlineStatus(dev);
    return;
  }
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; cardCtx[dev.id] = null; }
  var ctx = cardCtx[dev.id];
  if (!ctx) { ctx = cv.getContext('2d'); cardCtx[dev.id] = ctx; }
  if (!ctx) return;
  try { ctx.drawImage(bmp, 0, 0, w, h); } catch (e) { return; }
  cv.style.display = 'block';
  var overlay = document.getElementById('overlay_' + dev.id);
  if (overlay) overlay.style.display = 'none';
  dev._blank = false; updateBlankBadge(dev, false);
}

// ==================== 中继 WS 推帧 / RFB 增量帧消费 ====================
// 当开启 RELAY_WS_FRAMES=1，中继直接把每台设备的截图 JPEG 经浏览器 WS 推下来，
// 取代前端 HTTP 轮询（更省连接、更低延迟、同源零 CORS）。收到首帧即标记 wsFramePushActive，
// 让 fetchFrame 退化为慢速心跳，由 WS 推帧独占驱动，杜绝双通道重复解码与冲突。
// WS 断开时 onclose 复位该标志，fetchFrame 自动在 2s 内恢复 HTTP 轮询（自愈）。
var wsFramePushActive = false;

function drawFrameFromB64(dev, b64) {
  if (!b64) return;
  // RFB 增量帧优先级更高 → WS 整帧推帧让位，避免两通道争用同一画布
  if (dev._rfbActive) return;
  if (!wsFramePushActive) {
    wsFramePushActive = true;
    log('中继开启 WS 推帧模式：HTTP 轮询已让位给 WS 推帧', 'ok');
  }
  if (popWindows[dev.id] || dev._visible === false) return; // 弹窗/滚出视口暂停绘制
  // base64 → Uint8Array → Blob → ImageBitmap（保留与主通道一致的离线程解码质量）
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  var blob = new Blob([arr], { type: 'image/jpeg' });
  var drawViaBmp = function(bmp) {
    // 空白/暗帧检测：已有正常画面且本次为纯色/极暗 → 保留上一帧，标记"屏幕未激活"，与 HTTP 通道一致不闪黑
    if (dev._hasScreen && isBlankOrDarkFrame(bmp)) {
      dev.online = true; dev._blank = true; updateBlankBadge(dev, true);
      updateDeviceOnlineStatus(dev);
      return;
    }
    var cv = document.getElementById('cv_' + dev.id);
    if (!cv) return;
    if (cv.width !== bmp.width || cv.height !== bmp.height) { cv.width = bmp.width; cv.height = bmp.height; cardCtx[dev.id] = null; }
    var ctx = cardCtx[dev.id];
    if (!ctx) { ctx = cv.getContext('2d'); cardCtx[dev.id] = ctx; }
    if (!ctx) return;
    try { ctx.drawImage(bmp, 0, 0, bmp.width, bmp.height); } catch (e) { return; }
    cv.style.display = 'block';
    var overlay = document.getElementById('overlay_' + dev.id);
    if (overlay) overlay.style.display = 'none';
    dev._hasScreen = true; dev._blank = false; dev.online = true;
    updateBlankBadge(dev, false); updateDeviceOnlineStatus(dev);
  };
  if (typeof createImageBitmap !== 'undefined') {
    createImageBitmap(blob).then(drawViaBmp).catch(function() { /* 单帧解码失败忽略，等待下一推帧 */ });
  } else {
    // 老浏览器兜底：Image 主线程解码（保证 WS 推帧可用）
    var im = new Image();
    im.onload = function() { drawViaBmp(im); };
    im.src = 'data:image/jpeg;base64,' + b64;
  }
}

// RFB 增量帧桥（RELAY_RFB=1）：中继直连手机 :5901 VNC，只拉「变化矩形」(Raw 编码)，
// 把局部 RGBA 像素推给浏览器做精确局部刷新。前端为每张卡维护整帧离屏缓冲，
// 累积增量矩形后缩放绘制到可见 canvas，避免整屏重绘闪黑，且 CPU 占用远低于全屏重采。
function drawRfbFrame(dev, x, y, w, h, b64, fbw, fbh) {
  if (!b64 || !fbw || !fbh) return;
  if (popWindows[dev.id] || dev._visible === false) return;
  // 离屏整帧缓冲按上限缩放（默认宽 ≤480，与 HTTP 截图同量级），百台规模内存可控
  var DS = dev._rfbDS || (dev._rfbDS = Math.max(1, Math.ceil(fbw / 480)));
  var ow = Math.ceil(fbw / DS), oh = Math.ceil(fbh / DS);
  if (!dev._rfbCv || dev._rfbCv.width !== ow || dev._rfbCv.height !== oh) {
    var off = document.createElement('canvas');
    off.width = ow; off.height = oh;
    dev._rfbCv = off; dev._rfbCtx = off.getContext('2d');
  }
  var bin = atob(b64);
  var u8 = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  if (u8.length !== w * h * 4) return; // 尺寸不符则丢弃该增量矩形，避免 ImageData 越界
  // 增量矩形先放进临时画布（原始尺寸），再按 DS 缩放绘制到离屏缓冲（坐标同步缩放，整数对齐防缝隙）
  if (!dev._rfbTmp || dev._rfbTmp.width !== w || dev._rfbTmp.height !== h) {
    dev._rfbTmp = document.createElement('canvas'); dev._rfbTmp.width = w; dev._rfbTmp.height = h;
  }
  var tctx = dev._rfbTmp.getContext('2d');
  try { tctx.putImageData(new ImageData(new Uint8ClampedArray(u8), w, h), 0, 0); } catch (e) { return; }
  try { dev._rfbCtx.drawImage(dev._rfbTmp, 0, 0, w, h, Math.round(x / DS), Math.round(y / DS), Math.ceil(w / DS), Math.ceil(h / DS)); } catch (e) { return; }

  // ★ 整缓冲空白检测：VNC 当前无有效画面（熄屏/后台/初始帧未到）→ 不把黑画到卡片，
  //   保留上一帧并标记「屏幕未激活」，且让位回 HTTP（HTTP 也做空白检测），杜绝 RFB 永久黑屏
  if (isBlankOrDarkCanvas(dev._rfbCv)) {
    dev.online = true;
    dev._blank = true; updateBlankBadge(dev, true);
    updateDeviceOnlineStatus(dev);
    dev._rfbActive = false; // 释放接管，HTTP 轮询可重新绘真实截图（黑屏时显示角标而非黑屏）
    return;
  }

  // 非空白有效帧 → 接管该卡：HTTP 轮询绘制让位（见 drawBitmapToCard 守卫），避免双通道争用画布
  // 整缓冲缩放绘制到可见卡片 canvas（卡片 canvas 也用缩放后尺寸，省内存）
  var cv = document.getElementById('cv_' + dev.id);
  if (!cv) return;
  if (cv.width !== ow || cv.height !== oh) { cv.width = ow; cv.height = oh; cardCtx[dev.id] = null; }
  var ctx = cardCtx[dev.id];
  if (!ctx) { ctx = cv.getContext('2d'); cardCtx[dev.id] = ctx; }
  if (!ctx) return;
  try { ctx.drawImage(dev._rfbCv, 0, 0, ow, oh); } catch (e) { return; }
  cv.style.display = 'block';
  var overlay = document.getElementById('overlay_' + dev.id);
  if (overlay) overlay.style.display = 'none';
  dev._rfbActive = true; // 非空白有效帧 → 接管该卡
  dev._hasScreen = true; dev._blank = false; dev.online = true;
  updateBlankBadge(dev, false); updateDeviceOnlineStatus(dev);
}

function decodeOnMainThread(dev, url, onOk, onErr) {
  fetch(url).then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.blob(); })
    .then(function(b){ if(!b||b.size<500){ handleBlankFrame(dev); return; } return createImageBitmap(b); })
    .then(function(bmp){ if(!bmp) return; if(isBlankOrDarkFrame(bmp)){ handleBlankFrame(dev); } else { onOk(bmp, bmp.width, bmp.height); } })
    .catch(function(err){ onErr(String((err&&err.message)||err)); });
}

function requestFrameDecode(dev, url, onOk, onErr) {
  if (decodeWorker) {
    frameDecodeBusy[dev.id] = true;
    dev._wd = setTimeout(function() {
      // Worker 8s 无响应 → 标记失效并降级主线程，避免该卡永久卡死
      decodeWorker = null; frameDecodeBusy[dev.id] = false;
      if (typeof onErr === 'function') onErr('worker timeout');
    }, 8000);
    try { decodeWorker.postMessage({ type: 'decode', id: dev.id, url: url }); }
    catch (e) {
      frameDecodeBusy[dev.id] = false;
      if (dev._wd) { clearTimeout(dev._wd); dev._wd = null; }
      decodeWorker = null;
      if (typeof onErr === 'function') onErr('post fail');
    }
    return;
  }
  if (typeof createImageBitmap !== 'undefined' && typeof fetch !== 'undefined') {
    decodeOnMainThread(dev, url, onOk, onErr);
    return;
  }
  // 最老浏览器兜底：Image 主线程解码（保证可用）
  var im = new Image();
  im.onload = function() { onOk(im, im.naturalWidth, im.naturalHeight); };
  im.onerror = function() { onErr('img error'); };
  im.src = url;
}

function currentFrameParams(dev) {
  var base = dev.role === 'master' ? screenParams.master : screenParams.slave;
  if (dev._hovered) {
    // 悬停时拉高清 + 提速，便于肉眼确认
    return { quality: Math.min(0.85, base.quality + 0.25), scale: Math.max(0.3, base.scale), interval: Math.min(base.interval, 400) };
  }
  return { quality: base.quality, scale: base.scale, interval: base.interval };
}

function scheduleNextFrame(dev) {
  var params = currentFrameParams(dev);
  var minMs = params.interval;
  frameCounters[dev.id]++;
  var fpsNow = Date.now();
  if (fpsNow - (lastFpsTick[dev.id] || fpsNow) >= 1000) { frameCounters[dev.id] = 0; lastFpsTick[dev.id] = fpsNow; }
  activeTimers[dev.id] = setTimeout(function() { fetchFrame(dev); }, Math.max(0, minMs - (Date.now() - (dev._lastFetchTime || 0))));
}

function handleFrameError(dev) {
  if (dev._wd) { clearTimeout(dev._wd); dev._wd = null; }
  frameDecodeBusy[dev.id] = false;
  var cv = document.getElementById('cv_' + dev.id);
  var overlay = document.getElementById('overlay_' + dev.id);
  if (dev._hasScreen) {
    if (cv) cv.style.display = 'block';
    if (overlay) overlay.style.display = 'none';
  } else {
    if (cv) cv.style.display = 'none';
    if (overlay) overlay.style.display = 'flex';
  }
  dev.online = false;
  updateDeviceOnlineStatus(dev);
  if (!dev._screenErrLogged) { log('✗ ' + dev.name + ' 截图失败 (中继/手机在线?)', 'err'); dev._screenErrLogged = true; }
  activeTimers[dev.id] = setTimeout(function() { fetchFrame(dev); }, 2000);
}

// 空白/无信号帧：手机可达但返回空帧/熄屏（保留上一帧，显示"屏幕未激活"角标，不闪黑）
function handleBlankFrame(dev) {
  if (dev._wd) { clearTimeout(dev._wd); dev._wd = null; }
  frameDecodeBusy[dev.id] = false;
  dev.online = true;                 // 手机仍在线，只是屏未激活
  dev._blank = true; updateBlankBadge(dev, true);
  var cv = document.getElementById('cv_' + dev.id);
  var overlay = document.getElementById('overlay_' + dev.id);
  if (!dev._hasScreen) {
    if (cv) cv.style.display = 'none';
    if (overlay) overlay.style.display = 'flex';
  } else {
    if (cv) cv.style.display = 'block';
    if (overlay) overlay.style.display = 'none';
  }
  updateDeviceOnlineStatus(dev);
  if (!dev._screenErrLogged) { log('⚠ ' + dev.name + ' 屏幕未激活/空帧 (保留上一帧)', 'warn'); dev._screenErrLogged = true; }
  scheduleNextFrame(dev);
}

function setCardHover(devId, on) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;
  dev._hovered = on;
  if (on && !frameDecodeBusy[dev.id] && popWindows[dev.id] == null) {
    if (activeTimers[dev.id]) clearTimeout(activeTimers[dev.id]);
    fetchFrame(dev); // 悬停立即拉一帧高清
  }
}

function onCardIntersect(entries) {
  entries.forEach(function(en) {
    if (!en || !en.target || !en.target.id) return;
    var id = en.target.id.replace('card_', '');
    var dev = devices.find(function(d) { return d.id === id; });
    if (!dev) return;
    dev._visible = en.isIntersecting;
  });
}

function setupCardVisibilityObserver() {
  if (cardObserver) return;
  if (typeof IntersectionObserver === 'undefined') return; // 不支持则全部视为可见
  var root = document.getElementById('screensGrid');
  cardObserver = new IntersectionObserver(onCardIntersect, { root: root, rootMargin: '120px', threshold: 0.01 });
}

// ==================== 截图轮询（经中继 HTTP 代理）====================
function isRelayConnected() {
  return !!(relayWs && relayWs.readyState === 1);
}
function getScreenshotBaseUrl(dev) {
  var params = currentFrameParams(dev); // 悬停/可见性自适应画质
  if (relayIp) {
    // 始终走中继 HTTP 代理（与页面同源 localhost:9527：无 CORS、连接复用，比跨源直连手机快且稳）
    // 注意：截图代理不依赖浏览器 WS 连接，中继 HTTP 服务常驻即可用
    return 'http://' + relayIp + ':9527/api/screenshot?ip=' + encodeURIComponent(dev.ip)
      + '&format=jpeg&quality=' + params.quality + '&scale=' + params.scale + '&rotation=90&_t=';
  }
  // 中继不可达时回退直连手机 :8182（仍可用，仅失去同源性能优势）
  return 'http://' + dev.ip + ':8182/api/screenshot'
    + '?format=jpeg&quality=' + params.quality + '&scale=' + params.scale + '&rotation=90&_t=';
}

function startScreenRefresh(dev) {
  stopScreenRefresh(dev.id);
  frameCounters[dev.id] = 0;
  lastFpsTick[dev.id] = Date.now();
  if (dev._visible === undefined) dev._visible = true;
  dev._lastFetchTime = 0;
  fetchFrame(dev);
}

function fetchFrame(dev) {
  // WS 推帧模式（RELAY_WS_FRAMES=1）：HTTP 轮询已让位，仅挂慢速心跳，待推帧关闭时自动恢复
  if (wsFramePushActive) {
    activeTimers[dev.id] = setTimeout(function() { fetchFrame(dev); }, 2000);
    return;
  }
  // 弹窗已接管该设备 / 卡片滚出视口 → 暂停解码，仅慢速轮询状态（省主线程）
  if (popWindows[dev.id] || dev._visible === false) {
    activeTimers[dev.id] = setTimeout(function() { fetchFrame(dev); }, 1200);
    return;
  }
  if (frameDecodeBusy[dev.id]) return; // 上一次解码未完，跳过（单飞防堆积）

  var params = currentFrameParams(dev);
  var minMs = params.interval;
  var now = Date.now();
  var last = dev._lastFetchTime || 0;
  if (now - last < minMs) {
    activeTimers[dev.id] = setTimeout(function() { fetchFrame(dev); }, minMs - (now - last));
    return;
  }

  dev._lastFetchTime = now;
  var url = getScreenshotBaseUrl(dev) + Date.now();

  requestFrameDecode(dev, url,
    function onOk(bmp, w, h) {
      drawBitmapToCard(dev, bmp, w, h);
      dev.online = true; dev._hasScreen = true; dev._screenErrLogged = false;
      if (dev._wd) { clearTimeout(dev._wd); dev._wd = null; }
      updateDeviceOnlineStatus(dev);
      if (!dev._screenOkLogged) { log('✓ ' + dev.name + ' 截图正常', 'ok'); dev._screenOkLogged = true; }
      frameDecodeBusy[dev.id] = false;
      scheduleNextFrame(dev);
    },
    function onErr(msg) {
      handleFrameError(dev);
    }
  );
}

function stopScreenRefresh(devId) {
  if (activeTimers[devId]) {
    clearTimeout(activeTimers[devId]);
    delete activeTimers[devId];
  }
}

function updateDeviceOnlineStatus(dev) {
  if (dev._lastOnline === dev.online) return; // 状态未变则跳过 DOM 写入，避免每帧重排
  dev._lastOnline = dev.online;
  var dot = document.querySelector('#card_' + dev.id + ' .dot');
  if (dot) dot.className = 'dot ' + (dev.online ? 'dot-green' : 'dot-gray');
  updateTopInfo();
}

function updateBlankBadge(dev, on) {
  var el = document.getElementById('blank_' + dev.id);
  if (el) el.style.display = on ? 'block' : 'none';
}

function updateCardName(dev) {
  var el = document.querySelector('#card_' + dev.id + ' .name');
  if (el) { el.textContent = dev.name || dev.alias || dev.ip; el.title = dev.name || dev.alias || dev.ip; }
}

function startScreensOnly() {
  // 对所有已加载设备启动截图（不再限制 role !== 'none'）
  devices.forEach(function(dev) {
    if (activeTimers[dev.id]) return; // 已在刷新，避免 30s 轮询/中继重连时重复重启
    startScreenRefresh(dev);
  });
}

// ==================== 触摸事件（经中继 WS 广播）====================
var touchDown = false;
var lastTouchNX = 0, lastTouchNY = 0;
var lastMoveTime = 0;
var pendingMove = null;
var moveFlushTimer = null;
var MOVE_THROTTLE = 16;

function getNormPos(e, el) {
  var rect = el.getBoundingClientRect();
  var cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX; cy = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  var nx = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
  var ny = Math.max(0, Math.min(1, (cy - rect.top) / rect.height));
  return { x: nx, y: ny };
}

function sendTouchEvent(action, nx, ny) {
  if (!relayWs || relayWs.readyState !== 1) {
    // WS 未连接时提示
    return;
  }
  lastTouchNX = nx; lastTouchNY = ny;
  // rotation=90 变换
  var rx = 1 - ny;
  var ry = nx;
  var now = Date.now();
  if (action === 'move') {
    if (now - lastMoveTime < MOVE_THROTTLE) {
      pendingMove = { x: rx, y: ry };
      return;
    }
    lastMoveTime = now;
    pendingMove = null;
  }
  relayWs.send(JSON.stringify({type: 'touch', action: action, x: +rx.toFixed(4), y: +ry.toFixed(4)}));
  if (action !== 'move') {
    log('Touch ' + action + ' (' + nx.toFixed(3) + ',' + ny.toFixed(3) + ') → 广播所有手机', 'touch');
  }
}

function flushPendingMove() {
  if (pendingMove && relayWs && relayWs.readyState === 1) {
    relayWs.send(JSON.stringify({type: 'touch', action: 'move', x: +pendingMove.x.toFixed(4), y: +pendingMove.y.toFixed(4)}));
    pendingMove = null;
  }
  if (moveFlushTimer) { clearTimeout(moveFlushTimer); moveFlushTimer = null; }
}

function ensureMoveFlush() {
  if (pendingMove && !moveFlushTimer) {
    moveFlushTimer = setTimeout(function() { moveFlushTimer = null; flushPendingMove(); }, MOVE_THROTTLE);
  }
}

// 主控卡片不再绑定触摸/鼠标操控 —— 操控统一在跨屏弹窗中进行（generatePopOutHtml 内的 screenView 监听）
// 主页面卡片为纯展示，不接管输入事件，避免未设主控时误触、以及主控状态下在主卡发错。
function bindGlobalTouchEvents() {
  // 故意留空：输入操控只在双击弹出的独立窗口里进行。
}

// ==================== Home 键 ====================
function sendHomeToDev(devId) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;
  // 通过中继 WS 发送（会广播给所有手机）
  if (relayWs && relayWs.readyState === 1) {
    relayWs.send(JSON.stringify({type: 'key', action: 'home_down'}));
    setTimeout(function() {
      if (relayWs && relayWs.readyState === 1)
        relayWs.send(JSON.stringify({type: 'key', action: 'home_up'}));
    }, 50);
    log('🏠 ' + dev.name + ' Home 键（中继广播）', 'ok');
  } else {
    // fallback：直接调手机 HTTP API
    fetch('http://' + dev.ip + ':8182/api/home', { method: 'POST', signal: AbortSignal.timeout(3000) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        log('🏠 ' + dev.name + ' Home 键: ' + (d.success ? '成功' : d.error), d.success ? 'ok' : 'err');
      })
      .catch(function(e) { log('🏠 Home 键失败: ' + e.message, 'err'); });
  }
}

function sendHome(devId) { sendHomeToDev(devId); }

function sendDoubleHome(devId) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;
  if (relayWs && relayWs.readyState === 1) {
    relayWs.send(JSON.stringify({type: 'key', action: 'home_down'}));
    setTimeout(function() { if (relayWs && relayWs.readyState === 1) relayWs.send(JSON.stringify({type: 'key', action: 'home_up'})); }, 50);
    setTimeout(function() { if (relayWs && relayWs.readyState === 1) relayWs.send(JSON.stringify({type: 'key', action: 'home_down'})); }, 100);
    setTimeout(function() { if (relayWs && relayWs.readyState === 1) relayWs.send(JSON.stringify({type: 'key', action: 'home_up'})); }, 150);
    log('🏠² ' + dev.name + ' 双击 Home（中继广播）', 'ok');
  } else {
    fetch('http://' + dev.ip + ':8182/api/taskmanager', { method: 'POST', signal: AbortSignal.timeout(3000) })
      .then(function(r) { return r.json(); })
      .then(function(d) { log('🏠² ' + dev.name + ': ' + (d.success?'成功':d.error), d.success?'ok':'err'); })
      .catch(function(e) { log('双击 Home 失败: ' + e.message, 'err'); });
  }
}

// ==================== 设备角色管理 ====================
function setRole(id, role) {
  var dev = devices.find(function(d) { return d.id === id; });
  if (!dev) return;
  if (role === 'master') {
    devices.forEach(function(d) {
      if (d.id !== id && d.role === 'master') {
        d.role = 'slave';
        if (d.ip) roleOverrides[d.ip] = 'slave';
        pushDeviceRole(d);
      }
    });
  }
  dev.role = role;
  if (dev.ip) roleOverrides[dev.ip] = role;
  saveRoleOverrides();
  pushDeviceRole(dev);
  log('设备 ' + dev.name + ' 角色改为: ' + role, 'info');
  renderScreens();
  restartScreensForRoleChange();
}

function restartScreensForRoleChange() {
  // 重启所有截图（角色变化后画质参数可能不同）
  Object.keys(activeTimers).forEach(function(id) { clearTimeout(activeTimers[id]); });
  activeTimers = {};
  startScreensOnly();
}

// ==================== 中继连接管理（单台设备）====================
function connectDeviceRelay(devId) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;
  if (!relayIp) { toast('请先设置中继服务器 IP', 'err'); return; }

  log('连接中继: ' + dev.name + '(' + dev.ip + ') → ' + relayIp, 'info');
  var roleParam = dev.role === 'master' ? 'master' : 'slave';

  fetch('http://' + dev.ip + ':8182/api/group/relay/start?relayIp=' + encodeURIComponent(relayIp) + '&role=' + roleParam, {
    method: 'POST',
    signal: AbortSignal.timeout(8000),
    headers: {'Content-Type': 'application/json'}
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      dev.relayConnected = true;
      log('✓ ' + dev.name + ' 已连接中继 (role=' + roleParam + ')', 'ok');
      updateRelayBadge(dev);
      toast(dev.name + ' 已连接中继', 'ok');
    })
    .catch(function(e) {
      log('✗ ' + dev.name + ' 连接中继失败: ' + e.message, 'err');
      toast(dev.name + ' 连接中继失败: ' + e.message, 'err');
    });
}

function disconnectDeviceRelay(devId) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;

  log('断开中继: ' + dev.name, 'warn');
  fetch('http://' + dev.ip + ':8182/api/group/relay/stop', {
    method: 'POST',
    signal: AbortSignal.timeout(5000),
    headers: {'Content-Type': 'application/json'}
  })
    .then(function(r) { return r.json(); })
    .then(function() {
      dev.relayConnected = false;
      log('✓ ' + dev.name + ' 已断开中继', 'ok');
      updateRelayBadge(dev);
      toast(dev.name + ' 已断开中继', 'warn');
    })
    .catch(function(e) {
      log('✗ 断开中继失败: ' + e.message, 'err');
    });
}

function updateRelayBadge(dev) {
  var badge = document.getElementById('relayBadge_' + dev.id);
  if (!badge) return;
  badge.className = 'relay-status-badge ' + (dev.relayConnected ? 'relay-online' : 'relay-offline');
  badge.textContent = dev.relayConnected ? '已中继' : '未中继';
  updateTopInfo();
}

// ==================== 中继连接校验 ====================
// 开启/关闭群控后，向中继查询真实接入情况，校正每张卡"已中继/未中继"状态。
// 关键：connectAllRelay 在手机 relay/start 返回 200 即乐观置 relayConnected=true，
//       但手机 WS 未必真连上中继 → 卡片显示已连实则 slaves 为空、广播落空且静默。
//       这里以中继 /api/status 的权威名单校正，让"从控没反应"变得可见。
function normalizeIpFront(ip) {
  if (!ip) return ip;
  var s = String(ip).trim();
  if (s.indexOf('::ffff:') === 0) s = s.slice(7);
  return s;
}

function verifyRelayConnections() {
  if (!relayIp) return;
  fetch('http://' + relayIp + ':9527/api/status', { signal: AbortSignal.timeout(5000) })
    .then(function(r) { return r.json(); })
    .then(function(st) {
      var relayed = {};
      (st.masters || []).forEach(function(m) { relayed[normalizeIpFront(m.ip)] = 'master'; });
      (st.slaves || []).forEach(function(s) { relayed[normalizeIpFront(s.ip)] = 'slave'; });
      var missing = [];
      devices.forEach(function(d) {
        var ok = !!relayed[normalizeIpFront(d.ip)];
        d.relayConnected = ok;
        updateRelayBadge(d);
        if (!ok) missing.push(d);
      });
      if (missing.length === 0) {
        toast('群控就绪：全部 ' + devices.length + ' 台已接入中继 ✓', 'ok');
      } else {
        toast(missing.length + ' 台未接入中继（群控可能无效）: ' + missing.map(function(d){return d.ip;}).join(' '), 'warn', 6000);
        log('⚠ 未接入中继的设备（控制不会镜像到它们）: ' + missing.map(function(d){return d.name + '(' + d.ip + ')';}).join(', '), 'warn');
      }
    })
    .catch(function() { /* 中继不可达则跳过校正 */ });
}

// ==================== 批量中继操作 ====================
function connectAllRelay() {
  if (!relayIp) { toast('请先设置中继服务器 IP', 'err'); return; }
  var targetDevices = devices.filter(function(d) { return !d.relayConnected; });
  if (targetDevices.length === 0) { toast('所有设备都已连接中继', 'info'); return; }

  showBatchBar('正在连接 ' + targetDevices.length + ' 台设备到中继服务器...');
  var done = 0, fail = 0;

  targetDevices.forEach(function(dev, idx) {
    var roleParam = dev.role === 'master' ? 'master' : 'slave';
    setTimeout(function() {
      fetch('http://' + dev.ip + ':8182/api/group/relay/start?relayIp=' + encodeURIComponent(relayIp) + '&role=' + roleParam, {
        method: 'POST',
        signal: AbortSignal.timeout(8000),
        headers: {'Content-Type': 'application/json'}
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          dev.relayConnected = true; done++;
          updateRelayBadge(dev);
        })
        .catch(function() { fail++; })
        .finally(function() {
          if (done + fail === targetDevices.length) {
            hideBatchBar('完成! 成功 ' + done + ' 台, 失败 ' + fail + ' 台');
            verifyRelayConnections(); // 校正真实接入状态，让未连设备可见（逐卡 badge 原地更新，不重建网格）
          }
        });
    }, idx * 200); // 错开请求避免并发过大
  });
}

function disconnectAllRelay() {
  var targetDevices = devices.filter(function(d) { return d.relayConnected; });
  if (targetDevices.length === 0) { toast('没有需要断开的设备', 'info'); return; }

  showBatchBar('正在断开 ' + targetDevices.length + ' 台设备的中继连接...');
  var done = 0, fail = 0;

  targetDevices.forEach(function(dev, idx) {
    setTimeout(function() {
      fetch('http://' + dev.ip + ':8182/api/group/relay/stop', {
        method: 'POST',
        signal: AbortSignal.timeout(5000),
        headers: {'Content-Type': 'application/json'}
      })
        .then(function() { dev.relayConnected = false; done++; updateRelayBadge(dev); })
        .catch(function() { fail++; })
        .finally(function() {
          if (done + fail === targetDevices.length) {
            hideBatchBar('完成! 成功 ' + done + ' 台, 失败 ' + fail + ' 台');
          }
        });
    }, idx * 100);
  });
}

// ==================== 全局群控开关 ====================
// 默认关闭（groupControlOn=false），页面打开时所有设备都不会自动连中继。
// 点「开启群控」→ 所有设备连中继；点「关闭群控」→ 所有设备断中继。
function toggleGroupControl() {
  if (!relayIp) { toast('请先设置中继服务器 IP', 'err'); return; }
  if (!groupControlOn) {
    groupControlOn = true;
    setGroupControlBtn();
    connectRelayWS();      // 浏览器先连中继 WS（控制通道）
    connectAllRelay();     // 再让所有手机作为 slave 连入
  } else {
    groupControlOn = false;
    setGroupControlBtn();
    disconnectAllRelay();  // 手机断开中继
    disconnectRelayWS();   // 浏览器断开中继 WS
  }
}
function setGroupControlBtn() {
  var btn = document.getElementById('groupControlBtn');
  if (!btn) return;
  if (groupControlOn) {
    btn.textContent = '⏹ 关闭群控';
    btn.classList.add('active');
  } else {
    btn.textContent = '▶ 开启群控';
    btn.classList.remove('active');
  }
}

function showBatchBar(msg) {
  var bar = document.getElementById('batchBar');
  var info = document.getElementById('batchInfo');
  if (!bar || !info) return;
  bar.style.display = 'flex';
  info.textContent = msg;
}
function hideBatchBar(msg) {
  var bar = document.getElementById('batchBar');
  var info = document.getElementById('batchInfo');
  if (!bar || !info) return;
  info.textContent = msg;
  setTimeout(function() { bar.style.display = 'none'; }, 3000);
}

// ==================== 设备在线检测 ====================
function pingAll() {
  log('开始检测所有设备在线状态...', 'info');
  var count = devices.length;
  var checked = 0;
  var onlineNum = 0;

  devices.forEach(function(dev) {
    // 通过中继检测或直连检测
    var checkUrl = 'http://' + dev.ip + ':8182/api/status';
    var t0 = Date.now();
    fetch(checkUrl, {method: 'GET', signal: AbortSignal.timeout(3000)})
      .then(function(r) { return r.json(); })
      .then(function() {
        dev.online = true; onlineNum++;
        log(dev.name + ' (' + dev.ip + ') 在线 ✓ ' + (Date.now()-t0) + 'ms', 'ok');
        updateDeviceOnlineStatus(dev);
      })
      .catch(function() {
        dev.online = false;
        log(dev.name + ' (' + dev.ip + ') 离线 ✗', 'warn');
        updateDeviceOnlineStatus(dev);
      })
      .finally(function() {
        checked++;
        if (checked === count) {
          toast('检测完毕: ' + onlineNum + '/' + count + ' 台在线', onlineNum === count ? 'ok' : 'warn');
        }
      });
  });
}

// ==================== 弹出独立窗口 ====================
function popOutDevice(devId) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;

  // 已弹出 → 聚焦
  if (popWindows[devId] && !popWindows[devId].closed) {
    try { popWindows[devId].focus(); } catch(e) {}
    return;
  }

  stopScreenRefresh(devId);
  var popHtml = generatePopOutHtml(dev);

  // 用 Blob URL 打开弹窗：地址栏显示 blob: 而非 "about:blank"（Blob 同源继承，window.opener 回调/截图均正常）
  var popBlob = new Blob([popHtml], { type: 'text/html;charset=utf-8' });
  var popUrl = URL.createObjectURL(popBlob);
  popWindows[devId] = window.open(popUrl, 'TrollVNC_' + dev.ip.replace(/\./g,'_'),
    'width=720,height=480,resizable=yes,scrollbars=no');

  if (!popWindows[devId]) {
    try { URL.revokeObjectURL(popUrl); } catch(e){}
    toast('弹出窗口被浏览器拦截，请允许弹出窗口', 'err');
    startScreenRefresh(dev);
    return;
  }
  popWindows[devId]._blobUrl = popUrl; // 关闭时释放

  var card = document.getElementById('card_' + devId);
  if (card) card.classList.add('popped-out');
  var overlay = document.getElementById('popped_' + devId);
  if (overlay) overlay.style.display = 'flex';

  // 监听弹窗关闭
  if (popCheckIntervals[devId]) clearInterval(popCheckIntervals[devId]);
  popCheckIntervals[devId] = setInterval(function() {
    if (!popWindows[devId] || popWindows[devId].closed) {
      clearInterval(popCheckIntervals[devId]);
      delete popCheckIntervals[devId];
      delete popWindows[devId];
      bringBackDevice(devId);
    }
  }, 500);

  log('📺 ' + dev.name + ' 已弹出独立窗口', 'ok');
  toast(dev.name + ' 已弹出独立窗口', 'ok');
}

function bringBackDevice(devId) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;

  if (popWindows[devId] && !popWindows[devId].closed) {
    try { popWindows[devId].close(); } catch(e) {}
  }
  try { if (popWindows[devId] && popWindows[devId]._blobUrl) URL.revokeObjectURL(popWindows[devId]._blobUrl); } catch(e){}
  delete popWindows[devId];
  if (popCheckIntervals[devId]) { clearInterval(popCheckIntervals[devId]); delete popCheckIntervals[devId]; }

  var card = document.getElementById('card_' + devId);
  if (card) card.classList.remove('popped-out');
  var overlay = document.getElementById('popped_' + devId);
  if (overlay) overlay.style.display = 'none';

  startScreenRefresh(dev);
  log('📺 ' + dev.name + ' 已返回主界面', 'info');
}

// 弹窗回调：主控状态变更
function onPopOutMasterChanged(devId, isMaster) {
  var dev = devices.find(function(d) { return d.id === devId; });
  if (!dev) return;
  var affected = [];
  if (isMaster) {
    // 互斥：其他主控降级为从控，并同步持久化 + 服务器
    devices.forEach(function(d) {
      if (d.id !== devId && d.role === 'master') {
        d.role = 'slave';
        if (d.ip) { roleOverrides[d.ip] = 'slave'; affected.push(d); }
      }
    });
    dev.role = 'master';
  } else {
    dev.role = 'slave';
  }
  if (dev.ip) roleOverrides[dev.ip] = dev.role;
  affected.push(dev);
  saveRoleOverrides();
  affected.forEach(function(d) { pushDeviceRole(d); }); // 推服务器，保持镜像源与 UI 一致
  renderScreens();
  startScreensOnly();
  log('弹窗 ' + dev.name + ' ' + (isMaster ? '启用' : '关闭') + '主控', isMaster ? 'ok' : 'warn');
}
