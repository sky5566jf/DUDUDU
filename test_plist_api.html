<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plist API 测试</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
  h1 { color: #333; }
  .section { background: #f9f9f9; border-radius: 8px; padding: 20px; margin: 20px 0; }
  label { display: block; margin: 10px 0 5px; font-weight: bold; }
  input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
  textarea { height: 300px; font-family: monospace; font-size: 13px; }
  button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 10px 5px 10px 0; }
  button:hover { background: #0051d5; }
  button.danger { background: #ff3b30; }
  button.danger:hover { background: #d32f2f; }
  .result { background: #1a1a1a; color: #0f0; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; margin-top: 10px; }
  .result.error { color: #ff6b6b; }
  .result.info { color: #ffd93d; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  th { background: #eee; }
  .tag { display: inline-block; background: #007aff; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin: 2px; }
</style>
</head>
<body>

<h1>Plist API 测试工具</h1>

<!-- 读取 -->
<div class="section">
  <h2>📖 读取 Plist</h2>
  <label>设备 IP</label>
  <input type="text" id="readIp" value="192.69.0.45">
  <label>Plist 路径</label>
  <input type="text" id="readPath" value="/var/mobile/Containers/Data/Application/F79FA8D9-C4C3-4611-BFC7-06B3892A4C69/Library/Preferences/com.jao.yhdl.plist">
  <button onclick="readPlist()">读取</button>
</div>

<!-- 修改 -->
<div class="section">
  <h2>✏️ 修改 Plist（新格式）</h2>
  <label>设备 IP</label>
  <input type="text" id="writeIp" value="192.69.0.45">
  <label>Plist 路径</label>
  <input type="text" id="writePath" value="/var/mobile/Containers/Data/Application/F79FA8D9-C4C3-4611-BFC7-06B3892A4C69/Library/Preferences/com.jao.yhdl.plist">
  <label>set 键值对（JSON 格式）</label>
  <textarea id="setDict" placeholder='{"jieao_GameSid": "15"}'></textarea>
  <label>match（模糊匹配 key 包含此字符串）</label>
  <input type="text" id="matchKey" placeholder="userOftenServer">
  <label>matchValue（匹配 key 统一改成此值）</label>
  <input type="text" id="matchValue" placeholder="15">
  <button onclick="writePlist()">提交修改</button>
</div>

<!-- 结果 -->
<div class="section">
  <h2>📋 结果</h2>
  <div id="result" class="result">等待操作...</div>
</div>

<script>
function getBase(ip) {
  return `http://${ip}:8182`;
}

function formatXml(xml) {
  try {
    const x = xml.replace(/>\s*</g, '><');
    let formatted = '';
    let indent = 0;
    const tab = '  ';
    x.split(/(<[^>]+>)/).forEach(node => {
      if (!node.trim()) return;
      if (node.match(/^<\?/)) {
        formatted += node + '\n';
      } else if (node.match(/^<\//)) {
        indent--;
        formatted += tab.repeat(Math.max(0, indent)) + node + '\n';
      } else if (node.match(/^<[^/].*[^/]>$/)) {
        formatted += tab.repeat(indent) + node + '\n';
        indent++;
      } else {
        formatted += tab.repeat(indent) + node + '\n';
      }
    });
    return formatted.trim();
  } catch(e) {
    return xml;
  }
}

function syntaxHighlight(obj) {
  const s = JSON.stringify(obj, null, 2);
  return s.replace(/(".*?")\s*:/g, '<span style="color:#ff7b72">$1</span>:')
           .replace(/:\s*(".*?")/g, ': <span style="color:#a5d6ff">$1</span>')
           .replace(/:\s*(\d+)/g, ': <span style="color:#79c0ff">$1</span>');
}

async function readPlist() {
  const ip = document.getElementById('readIp').value.trim();
  const path = document.getElementById('readPath').value.trim();
  const result = document.getElementById('result');
  result.className = 'result';
  result.textContent = '读取中...';

  try {
    const resp = await fetch(`${getBase(ip)}/api/plist?path=${encodeURIComponent(path)}`);
    const text = await resp.text();
    result.innerHTML = `<span class="tag">${resp.status} ${resp.statusText}</span>\n\n` + formatXml(text);
  } catch(e) {
    result.className = 'result error';
    result.textContent = '请求失败: ' + e.message;
  }
}

async function writePlist() {
  const ip = document.getElementById('writeIp').value.trim();
  const path = document.getElementById('writePath').value.trim();
  let setDict;
  try {
    setDict = JSON.parse(document.getElementById('setDict').value || '{}');
  } catch(e) {
    document.getElementById('result').className = 'result error';
    document.getElementById('result').textContent = 'set 格式错误: ' + e.message;
    return;
  }
  const match = document.getElementById('matchKey').value.trim();
  const matchValue = document.getElementById('matchValue').value.trim();
  const result = document.getElementById('result');
  result.className = 'result';
  result.textContent = '提交中...';

  const body = { path, set: setDict };
  if (match) body.match = match;
  if (matchValue) body.matchValue = matchValue;

  try {
    const resp = await fetch(`${getBase(ip)}/api/plist?path=${encodeURIComponent(path)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await resp.json();
    const ok = json.success;
    result.className = ok ? 'result' : 'result error';
    result.innerHTML = `<span class="tag">${resp.status} ${resp.statusText}</span>` +
      (ok ? `<span class="tag" style="background:#34c759">OK</span>` : `<span class="tag" style="background:#ff3b30">FAIL</span>`) +
      '\n\n' + syntaxHighlight(json) +
      '\n\n<span class="tag info">modified:</span> ' + (json.modified || []).map(k => `<span class="tag">${k}</span>`).join(' ');
  } catch(e) {
    result.className = 'result error';
    result.textContent = '请求失败: ' + e.message;
  }
}
</script>

</body>
</html>
