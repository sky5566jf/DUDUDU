<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrollVNC Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h2 {
            color: #4a9eff;
            margin-top: 0;
        }
        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            background: #4a9eff;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #3a8eef;
        }
        .result {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #f44336;
        }
        .info {
            color: #2196f3;
        }
    </style>
</head>
<body>
    <h1>TrollVNC API 测试</h1>
    
    <div class="section">
        <h2>服务器配置</h2>
        <input type="text" id="serverIp" placeholder="iOS 设备 IP 地址" value="192.168.1.100">
        <input type="number" id="serverPort" placeholder="端口" value="8182">
        <button onclick="testStatus()">测试连接</button>
        <div id="statusResult" class="result"></div>
    </div>

    <div class="section">
        <h2>上传文件 (任意类型)</h2>
        <input type="text" id="uploadPath" placeholder="目标路径" value="/var/mobile/Documents/test.bin">
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">上传文件</button>
        <div id="uploadResult" class="result"></div>
    </div>

    <div class="section">
        <h2>写入文本文件</h2>
        <input type="text" id="textPath" placeholder="目标路径" value="/var/mobile/Documents/test.txt">
        <textarea id="textContent" rows="4" placeholder="文件内容">Hello World!
这是测试内容。</textarea>
        <button onclick="writeText()">写入文本</button>
        <div id="textResult" class="result"></div>
    </div>

    <script>
        function getBaseUrl() {
            const ip = document.getElementById('serverIp').value;
            const port = document.getElementById('serverPort').value;
            return `http://${ip}:${port}`;
        }

        function showResult(elementId, message, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'result ' + (isError ? 'error' : 'success');
        }

        async function testStatus() {
            const resultEl = document.getElementById('statusResult');
            resultEl.textContent = '测试中...';
            resultEl.className = 'result info';
            
            try {
                const response = await fetch(`${getBaseUrl()}/api/status`);
                const data = await response.json();
                showResult('statusResult', `连接成功!\n${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                showResult('statusResult', `连接失败: ${error.message}`, true);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const path = document.getElementById('uploadPath').value;
            const resultEl = document.getElementById('uploadResult');
            
            if (!fileInput.files.length) {
                showResult('uploadResult', '请选择文件', true);
                return;
            }
            
            const file = fileInput.files[0];
            resultEl.textContent = `正在上传 ${file.name} (${file.size} 字节)...`;
            resultEl.className = 'result info';
            
            try {
                const response = await fetch(`${getBaseUrl()}/api/upload?path=${encodeURIComponent(path)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/octet-stream'
                    },
                    body: file
                });
                
                const data = await response.json();
                if (data.success) {
                    showResult('uploadResult', `上传成功!\n${JSON.stringify(data, null, 2)}`);
                } else {
                    showResult('uploadResult', `上传失败: ${data.error}\n${JSON.stringify(data, null, 2)}`, true);
                }
            } catch (error) {
                showResult('uploadResult', `上传错误: ${error.message}`, true);
                console.error('Upload error:', error);
            }
        }

        async function writeText() {
            const path = document.getElementById('textPath').value;
            const content = document.getElementById('textContent').value;
            const resultEl = document.getElementById('textResult');
            
            resultEl.textContent = '正在写入...';
            resultEl.className = 'result info';
            
            try {
                const response = await fetch(`${getBaseUrl()}/api/writefile_text?path=${encodeURIComponent(path)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain; charset=utf-8'
                    },
                    body: content
                });
                
                const data = await response.json();
                if (data.success) {
                    showResult('textResult', `写入成功!\n${JSON.stringify(data, null, 2)}`);
                } else {
                    showResult('textResult', `写入失败: ${data.error}\n${JSON.stringify(data, null, 2)}`, true);
                }
            } catch (error) {
                showResult('textResult', `写入错误: ${error.message}`, true);
                console.error('Write error:', error);
            }
        }
    </script>
</body>
</html>
