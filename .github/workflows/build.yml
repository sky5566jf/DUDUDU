name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build with Theos
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Cache Theos SDKs
        id: cache-sdks
        uses: actions/cache@v4
        with:
          path: theos/sdks
          key: theos-sdks-${{ runner.os }}

      - name: Download iOS SDKs
        if: steps.cache-sdks.outputs.cache-hit != 'true'
        run: |
          curl -Lo /tmp/sdks.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdks.tar.xz -C theos/sdks/

      - name: Setup Environment
        run: |
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/theos/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          brew install ldid dpkg xz

      - name: Build (rootless)
        run: |
          make clean
          make THEOS_PACKAGE_SCHEME=rootless -j$(sysctl -n hw.ncpu)

      - name: Package (rootless)
        run: |
          make package THEOS_PACKAGE_SCHEME=rootless -j$(sysctl -n hw.ncpu)

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: MatisuXCS-rootless
          path: packages/*.deb
          if-no-files-found: warn
